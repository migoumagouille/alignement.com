<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mont Saint-Hilaire — L'Aligneur de Menhirs</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 28px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 2px;
      opacity: 0.9;
    }

    .retour {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(200,116,10,0.7);
      background: none;
      border: none;
      border-bottom: 1px solid rgba(200,116,10,0.3);
      padding-bottom: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .retour:hover {
      color: #f0ead8;
      border-color: #f0ead8;
      letter-spacing: 7px;
    }
  </style>
</head>
<body>

  <img src="images/carte_montagne1.jpg" alt="Carte du Mont Saint-Hilaire">
  <button class="retour" id="retour-btn">← Retour</button>

<script src="retour.js"></script>
</body>
</html>
