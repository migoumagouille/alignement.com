<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Météo animée — Est Amérique · Alignement.com</title>
<meta name="author" content="L'aligneur de menhirs">
<meta name="description" content="Animation météo 24h — vent, précipitations, température, vagues. Est de l'Amérique. Alignement.com">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@2.1.1/dist/leaflet-velocity.min.css">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:      #0f1117;
    --surface: #181c25;
    --border:  #2a2f3e;
    --accent:  #5b8dee;
    --accent2: #3ecfb0;
    --gold:    #e8a020;
    --text:    #dde3f0;
    --muted:   #7a849e;
    --red:     #e05555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 1.05rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header a {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
    color: var(--text);
  }

  header img { height: 34px; width: auto; }

  .site-title {
    font-size: 0.95rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  .site-title strong { color: var(--text); }

  .back-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    transition: color .2s;
  }

  .back-link:hover { color: var(--accent); }

  /* CONTROLS */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .layer-tabs { display: flex; gap: 4px; }

  .layer-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }

  .layer-btn:hover { border-color: var(--accent); color: var(--text); }
  .layer-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .layer-btn[data-layer="precipitation"].active { background: #4488ff; border-color: #4488ff; }
  .layer-btn[data-layer="temperature"].active   { background: #e07030; border-color: #e07030; }
  .layer-btn[data-layer="waves"].active         { background: var(--accent2); border-color: var(--accent2); color: #0f1117; }

  .time-controls {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex: 1;
    min-width: 200px;
  }

  .play-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
  }

  .play-btn:hover { border-color: var(--accent); color: var(--accent); }
  .play-btn.playing { border-color: var(--accent2); color: var(--accent2); }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .time-utc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    opacity: 0.5;
  }

  .time-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    min-width: 55px;
    text-align: center;
  }

  #map { flex: 1; min-height: 500px; }
  #map, #map * { cursor: default !important; }

  .status-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.45rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .dot-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: blink 2s infinite;
    flex-shrink: 0;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  #no-data {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem 2.5rem;
    text-align: center;
    z-index: 1000;
    max-width: 340px;
  }

  #no-data h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--gold); }

  #no-data p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .map-wrapper { flex: 1; position: relative; min-height: 500px; }

  .legend {
    position: absolute;
    bottom: 30px; right: 10px;
    z-index: 500;
    background: rgba(24, 28, 37, 0.88);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    pointer-events: none;
    min-width: 120px;
  }

  .legend-title {
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .legend-gradient { height: 10px; border-radius: 4px; margin: 4px 0; }

  .legend-labels {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    font-size: 0.65rem;
  }

  @media (max-width: 600px) {
    .controls { padding: 0.6rem 1rem; gap: 0.8rem; }
    .layer-btn { padding: 4px 8px; font-size: 0.7rem; }
    header { padding: 0.9rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <a href="https://alignement.com">
    <img src="../gnomon1.png" alt="Alignement.com">
    <span class="site-title"><strong>alignement.com</strong> — météo animée</span>
  </a>
  <a href="../conus/" class="back-link">← Retour météo</a>
</header>

<div class="controls">
  <div class="layer-tabs">
    <button class="layer-btn active" data-layer="wind">💨 Vent</button>
    <button class="layer-btn" data-layer="precipitation">🌧 Pluie</button>
    <button class="layer-btn" data-layer="temperature">🌡 Temp.</button>
    <button class="layer-btn" data-layer="waves">🌊 Vagues</button>
    <button class="layer-btn" data-layer="cloud">☁ Nuages</button>
  </div>
  <div class="time-controls">
    <button class="play-btn" id="playBtn" title="Lecture / Pause">▶</button>
    <input type="range" id="timeSlider" min="0" max="23" value="0" step="1">
    <span class="time-display" id="timeDisplay">00 h</span>
    <span class="time-utc">UTC</span>
  </div>
</div>

<div class="map-wrapper">
  <div id="map"></div>
  <div id="no-data">
    <h2>Données indisponibles</h2>
    <p>Les données météo sont générées chaque matin.<br>
    Revenez demain ou vérifiez que le cron est configuré.</p>
  </div>
  <div class="legend" id="legend" style="display:none">
    <div class="legend-title" id="legendTitle">Vent</div>
    <div class="legend-gradient" id="legendGrad"></div>
    <div class="legend-labels" id="legendLabels"></div>
  </div>
</div>

<div class="status-bar">
  <span class="dot-live" id="statusDot" style="background:var(--border)"></span>
  <span id="statusText">Chargement…</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@2.1.1/dist/leaflet-velocity.min.js"></script>
<script src="animation.js"></script>
</body>
</html>
