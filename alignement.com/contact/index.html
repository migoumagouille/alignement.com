<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contactez-nous — Alignement.com</title>
  <link rel="preload" href="/fonts/fonts.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="/fonts/fonts.css"></noscript>
  <style>
    :root {
      --navy: #0a1628;
      --accent: #2e7de9;
      --gold: #e8a020;
      --light: #e8eef8;
      --white: #ffffff;
      --card-bg: rgba(255,255,255,0.04);
      --border: rgba(46,125,233,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--light);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(46,125,233,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,125,233,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(46,125,233,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* NAV */
    nav { padding: 24px 0 10px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: rgba(232,238,248,0.4);
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '←'; }

    /* HEADER */
    header {
      padding: 40px 0 36px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--white) 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      color: rgba(232,238,248,0.45);
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .header-line {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 16px auto 0;
    }

    /* CARD FORMULAIRE */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      animation: fadeUp 0.6s ease both 0.1s;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(232,238,248,0.55);
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(46,125,233,0.2);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--light);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(46,125,233,0.12);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(232,238,248,0.2);
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), #1a5fbb);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 6px;
    }

    .submit-btn:hover {
      opacity: 0.88;
      transform: translateY(-2px);
    }

    .submit-btn:active { transform: translateY(0); }

    /* Messages de statut */
    .status-msg {
      display: none;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 0.95rem;
      margin-top: 18px;
      text-align: center;
    }

    .status-msg.success {
      display: block;
      background: rgba(39,174,96,0.12);
      border: 1px solid rgba(39,174,96,0.3);
      color: #82e0aa;
    }

    .status-msg.error {
      display: block;
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: #f1948a;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px 0 40px;
      position: relative;
      z-index: 1;
    }

    footer p {
      font-size: 0.78rem;
      color: rgba(232,238,248,0.2);
      letter-spacing: 1px;
    }

    footer a { color: rgba(46,125,233,0.5); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<div class="container">

  <nav>
    <a href="/index.html" class="back-link">Alignement.com</a>
  </nav>

  <header>
    <h1>Contactez-nous</h1>
    <p>Une question, une remarque ou un projet? Écrivez-nous!</p>
    <div class="header-line"></div>
  </header>

  <div class="form-card">
    <form id="contactForm">
      <div class="form-group">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" placeholder="Votre nom complet" required>
      </div>
      <div class="form-group">
        <label for="courriel">Courriel</label>
        <input type="email" id="courriel" name="courriel" placeholder="votre@courriel.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Votre message..." required></textarea>
      </div>
      <button type="submit" class="submit-btn">✉️ &nbsp;Envoyer le message</button>
    </form>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <footer>
    <p><a href="/index.html">← Retour à Alignement.com</a> &nbsp;·&nbsp; &copy; 2026 Alignement.com</p>
  </footer>

</div>

<script src="/js/contact.js"></script>

</body>
</html>
