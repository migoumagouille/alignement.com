<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cul de sac — L'Aligneur de Menhirs</title>
  <link rel="stylesheet" href="/fonts/fonts-cinzel-crimson.css">
  <style>
    :root {
      --black: #000000;
      --amber: #c8740a;
      --bone: #d4c9b0;
      --white: #f0ead8;
      --silver: #a0a8b0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--bone);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 1.25rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      max-width: 580px;
      width: 100%;
      text-align: center;
      animation: fadeIn 1.2s ease both;
    }

    .scene img {
      max-width: 100%;
      height: auto;
      opacity: 0.85;
      filter: sepia(0.2) contrast(1.05);
      border-radius: 2px;
    }

    .message {
      font-style: italic;
      color: var(--white);
      line-height: 1.85;
    }

    .retour {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(200,116,10,0.7);
      text-decoration: none;
      border-bottom: 1px solid rgba(200,116,10,0.3);
      padding-bottom: 3px;
      transition: all 0.3s;
      cursor: pointer;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-size: 0.75rem;
    }

    .retour:hover {
      color: var(--white);
      border-color: var(--white);
      letter-spacing: 7px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="scene">
  <img src="images/depression.gif" alt="Cul de sac">
  <p class="message">
    Vous êtes à la fin de ce chapitre.<br>
    Mais qui sait bientôt...
  </p>
  <button class="retour" id="retour-btn">← Retour</button>
</div>

<script src="retour.js"></script>
</body>
</html>
